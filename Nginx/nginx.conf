server {
    listen 80;
    server_name chat.scalio.cloud;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chat.scalio.cloud;

    # SSL Certificate Paths (Mounted from host /etc/letsencrypt)
    ssl_certificate     /etc/letsencrypt/live/chat.scalio.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.scalio.cloud/privkey.pem;

    # Optimization for SSL
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        # Proxy to the 'frontend' service on internal Docker network
        proxy_pass http://frontend:80; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # IMPORTANT: API Proxying for Auth
    location /auth/ {
        # Proxy to the 'backend' service on internal Docker network
        proxy_pass http://backend:4000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # IMPORTANT: WebSocket Proxying for Socket.io
    location /socket.io/ {
        # Proxy to the 'backend' service on internal Docker network
        proxy_pass http://backend:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
