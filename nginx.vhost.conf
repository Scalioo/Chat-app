server {
    listen 80;
    server_name chat.scalio.cloud;

    # Redirect all HTTP traffic to HTTPS (Certbot will add this automatically, 
    # but here is the manual version for completeness)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://localhost:3000; # Frontend Docker container port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # IMPORTANT: WebSocket Proxying for Socket.io
    location /socket.io/ {
        proxy_pass http://localhost:4000/socket.io/; # Backend Docker container port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings for long-lived connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
